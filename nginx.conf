server {
    listen 80;
    server_name localhost;

    # Root directory containing the built Flutter Web files
    # Typically copied after running 'flutter build web'
    root /var/www/dbconn/web;
    index index.html;

    # Support Flutter Web routing and static assets
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the Go Gin REST API Server
    location /api/ {
        # Redirect api traffic to local Go Gin REST service on port 10001
        proxy_pass http://127.0.0.1:10001/api/;
        
        # Preserve client headers and information
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable cache for database interactions
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        expires 0;
    }

    # Custom error pages (optional)
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
